name: Docker Publish

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io

jobs:
  validate-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Docker Hub secrets
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          test -n "$DOCKERHUB_USERNAME" || { echo "::error::Missing secret DOCKERHUB_USERNAME"; exit 1; }
          test -n "$DOCKERHUB_TOKEN" || { echo "::error::Missing secret DOCKERHUB_TOKEN"; exit 1; }

  publish:
    needs: validate-secrets
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ollama
            dockerfile: ollama/Dockerfile
          - image: chat2m-gateway
            dockerfile: voice-gateway/Dockerfile
          - image: chat2m-wake
            dockerfile: voice-agent/wake/Dockerfile
          - image: chat2m-speech
            dockerfile: voice-agent/speech/Dockerfile
          - image: chat2m-status
            dockerfile: voice-agent/status/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image tags
        id: image-tags
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_NAME: ${{ matrix.image }}
        run: |
          date_tag="$(TZ=Asia/Shanghai date +%Y%m%d)"
          image="${REGISTRY}/${DOCKERHUB_USERNAME}/${IMAGE_NAME}"
          {
            echo "tags<<EOF"
            echo "${image}:latest"
            echo "${image}:${date_tag}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/arm64
          push: true
          tags: ${{ steps.image-tags.outputs.tags }}
