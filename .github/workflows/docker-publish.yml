name: Docker Publish

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: docker.io

jobs:
  validate-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Docker Hub secrets
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          test -n "$DOCKERHUB_USERNAME" || { echo "::error::Missing secret DOCKERHUB_USERNAME"; exit 1; }
          test -n "$DOCKERHUB_TOKEN" || { echo "::error::Missing secret DOCKERHUB_TOKEN"; exit 1; }

  publish:
    needs: validate-secrets
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ollama
            dockerfile: ollama/Dockerfile
          - image: chat2m-gateway
            dockerfile: voice-gateway/Dockerfile
          - image: chat2m-wake
            dockerfile: voice-agent/Dockerfile
          - image: chat2m-speech
            dockerfile: voice-agent/Dockerfile
          - image: chat2m-status
            dockerfile: voice-agent/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
