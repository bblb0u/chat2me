name: chat2m

services:
  ollama:
    image: bblb0u/ollama:latest
    container_name: ollama
    restart: unless-stopped
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      OLLAMA_LLM_LIBRARY: cuda_jetpack5
      JETSON_JETPACK: "5"
      LD_LIBRARY_PATH: /usr/lib/ollama:/usr/lib/ollama/cuda_jetpack5:/usr/local/nvidia/lib:/usr/local/nvidia/lib64
    volumes:
      - ./data/config:/app/config
      - ./data/ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  chat2m-gateway:
    image: bblb0u/chat2m-gateway:latest
    container_name: chat2m-gateway
    restart: unless-stopped
    volumes:
      - ./data/config:/app/config
    depends_on:
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3).read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  chat2m-status:
    image: bblb0u/chat2m-status:latest
    container_name: chat2m-status
    restart: unless-stopped
    privileged: true
    command: ["python3", "-m", "app.status"]
    volumes:
      - ./data/config:/app/config
      - /dev:/host-dev
    environment:
      VOICE_MODELS_REQUIRED: "0"
      VOICE_ROLE: chat2m-status
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8091/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  chat2m-speech:
    image: bblb0u/chat2m-speech:latest
    container_name: chat2m-speech
    restart: unless-stopped
    devices:
      - /dev/snd:/dev/snd
    command: ["python3", "-m", "app.speech"]
    environment:
      VOICE_ROLE: chat2m-speech
    volumes:
      - ./data/models:/models
      - ./data/config:/app/config
      - /etc/asound.conf:/etc/asound.conf:ro
    depends_on:
      chat2m-gateway:
        condition: service_healthy
      chat2m-status:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  chat2m-wake:
    image: bblb0u/chat2m-wake:latest
    container_name: chat2m-wake
    restart: unless-stopped
    devices:
      - /dev/snd:/dev/snd
    command: ["python3", "-m", "app.wake"]
    environment:
      VOICE_ROLE: chat2m-wake
    volumes:
      - ./data/models:/models
      - ./data/config:/app/config
      - /etc/asound.conf:/etc/asound.conf:ro
    depends_on:
      chat2m-speech:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8092/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
