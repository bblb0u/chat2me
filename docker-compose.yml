name: chat2me

services:
  chat2me-llm:
    image: gitwarp.pages.dev/bblb0u/chat2me-llm:latest
    container_name: chat2me-llm
    restart: unless-stopped
    runtime: nvidia
    environment:
      VOICE_ROLE: chat2me-llm
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      OLLAMA_LLM_LIBRARY: cuda_jetpack5
      JETSON_JETPACK: "5"
      LD_LIBRARY_PATH: /usr/lib/ollama:/usr/lib/ollama/cuda_jetpack5:/usr/local/nvidia/lib:/usr/local/nvidia/lib64
    volumes:
      - ./data/config:/app/config
      - ./data/log:/app/log
      - ./data/ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  chat2me-core:
    image: gitwarp.pages.dev/bblb0u/chat2me-core:latest
    container_name: chat2me-core
    restart: unless-stopped
    environment:
      VOICE_ROLE: chat2me-core
    volumes:
      - ./data/config:/app/config
      - ./data/log:/app/log
    depends_on:
      chat2me-llm:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3).read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  chat2me-relay:
    image: gitwarp.pages.dev/bblb0u/chat2me-relay:latest
    container_name: chat2me-relay
    restart: unless-stopped
    command: ["python3", "-m", "app.main"]
    device_cgroup_rules:
      - "c 166:* rwm"
    volumes:
      - /dev:/host-dev
      - ./data/config:/app/config
      - ./data/log:/app/log
    environment:
      VOICE_ROLE: chat2me-relay
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8091/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  chat2me-asr:
    image: gitwarp.pages.dev/bblb0u/chat2me-asr:latest
    build:
      context: .
      dockerfile: services/asr/Dockerfile
    container_name: chat2me-asr
    restart: unless-stopped
    command: ["python3", "-m", "app.main"]
    environment:
      VOICE_ROLE: chat2me-asr
    volumes:
      - ./data/models:/models
      - ./data/config:/app/config
      - ./data/log:/app/log
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8092/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20m

  chat2me-tts:
    image: gitwarp.pages.dev/bblb0u/chat2me-tts:latest
    build:
      context: .
      dockerfile: services/tts/Dockerfile
    container_name: chat2me-tts
    restart: unless-stopped
    runtime: nvidia
    command: ["python3", "-m", "app.main"]
    environment:
      VOICE_ROLE: chat2me-tts
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      LD_LIBRARY_PATH: /usr/local/cuda-11.4/targets/aarch64-linux/lib:/usr/local/cuda/lib64:/usr/lib/aarch64-linux-gnu:/usr/lib/aarch64-linux-gnu/tegra
    volumes:
      - ./data/models:/models
      - ./data/config:/app/config
      - ./data/log:/app/log
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8093/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20m

  chat2me-speech:
    image: gitwarp.pages.dev/bblb0u/chat2me-speech:latest
    build:
      context: .
      dockerfile: services/speech/Dockerfile
    container_name: chat2me-speech
    restart: unless-stopped
    devices:
      - /dev/snd:/dev/snd
      - /dev/bus/usb:/dev/bus/usb
    command: ["python3", "-m", "app.main"]
    environment:
      VOICE_ROLE: chat2me-speech
    volumes:
      - ./data/models:/models
      - ./data/config:/app/config
      - ./data/log:/app/log
      - /etc/asound.conf:/etc/asound.conf:ro
    depends_on:
      chat2me-core:
        condition: service_healthy
      chat2me-asr:
        condition: service_healthy
      chat2me-tts:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
