services:
  ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama:latest}
    container_name: chat2m-ollama
    restart: unless-stopped
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      OLLAMA_LLM_LIBRARY: cuda_jetpack5
      JETSON_JETPACK: "5"
      LD_LIBRARY_PATH: /usr/lib/ollama:/usr/lib/ollama/cuda_jetpack5:/usr/local/nvidia/lib:/usr/local/nvidia/lib64
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  ollama-model-init:
    image: ${OLLAMA_IMAGE:-ollama/ollama:latest}
    container_name: chat2m-ollama-model-init
    profiles: ["init"]
    runtime: nvidia
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      OLLAMA_LLM_LIBRARY: cuda_jetpack5
      JETSON_JETPACK: "5"
      LD_LIBRARY_PATH: /usr/lib/ollama:/usr/lib/ollama/cuda_jetpack5:/usr/local/nvidia/lib:/usr/local/nvidia/lib64
    depends_on:
      ollama:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -lc
      - |
        until ollama list >/dev/null 2>&1; do
          sleep 2
        done
        ollama pull "$${OLLAMA_MODEL}"

  voice-gateway:
    build:
      context: ./voice-gateway
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.11-slim}
    image: chat2m/voice-gateway:local
    container_name: chat2m-voice-gateway
    restart: unless-stopped
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
      PROFILE_PATH: /app/config/profile.yaml
      SAFETY_PATH: /app/config/safety.yaml
    ports:
      - "8080:8080"
    volumes:
      - ./config:/app/config:ro
    depends_on:
      ollama:
        condition: service_started

  voice-agent:
    build:
      context: ./voice-agent
    image: chat2m/voice-agent:local
    container_name: chat2m-voice-agent
    restart: unless-stopped
    profiles: ["voice"]
    devices:
      - /dev/snd:/dev/snd
    environment:
      AUDIO_INPUT_DEVICE: ${AUDIO_INPUT_DEVICE:-ReSpeaker}
      AUDIO_INPUT_CHANNELS: ${AUDIO_INPUT_CHANNELS:-1}
      AUDIO_INPUT_CHANNEL_INDEX: ${AUDIO_INPUT_CHANNEL_INDEX:-0}
      AUDIO_OUTPUT_DEVICE: ${AUDIO_OUTPUT_DEVICE:-default}
      GATEWAY_URL: http://voice-gateway:8080/chat
      COMMAND_TIMEOUT_SECONDS: ${COMMAND_TIMEOUT_SECONDS:-10}
      COMMAND_LEADING_SILENCE_SECONDS: ${COMMAND_LEADING_SILENCE_SECONDS:-4}
      SPEECH_RMS_THRESHOLD: ${SPEECH_RMS_THRESHOLD:-0.006}
      PIPER_MODEL: ${PIPER_MODEL:-/models/piper/zh_CN-huayan-medium/model.onnx}
      PIPER_CONFIG: ${PIPER_CONFIG:-/models/piper/zh_CN-huayan-medium/model.onnx.json}
      PIPER_SPEAKER: ${PIPER_SPEAKER:-0}
      PIPER_LENGTH_SCALE: ${PIPER_LENGTH_SCALE:-0.9}
      PIPER_VOLUME: ${PIPER_VOLUME:-1.0}
      WAKE_RESPONSE: ${WAKE_RESPONSE:-有什么可以帮助您的}
      SESSION_IDLE_RESPONSE: ${SESSION_IDLE_RESPONSE:-}
      SESSION_END_RESPONSE: ${SESSION_END_RESPONSE:-好的，我先待机}
      MAX_SESSION_TURNS: ${MAX_SESSION_TURNS:-8}
    volumes:
      - ./models:/models
      - ./config:/app/config:ro
    depends_on:
      voice-gateway:
        condition: service_started

volumes:
  ollama-data:
